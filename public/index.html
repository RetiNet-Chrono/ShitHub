<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShitHub - 代码托管平台</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='100' r='95' fill='%2324292f'/%3E%3Cg transform='translate(100, 100) scale(0.85) translate(-90, -122)'%3E%3Crect x='15' y='144' width='150' height='36' rx='18' fill='%23e6edf3'/%3E%3Crect x='35' y='116' width='110' height='32' rx='16' fill='%23e6edf3'/%3E%3Crect x='55' y='93' width='70' height='28' rx='14' fill='%23e6edf3'/%3E%3Cg transform='rotate(15, 90, 88)'%3E%3Cpath d='M 90 64 C 90 64, 76 82, 76 88 A 14 14 0 0 0 104 88 C 104 82, 90 64, 90 64 Z' fill='%23e6edf3'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  line-height: 1.5;
  min-height: 100vh;
}
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; font-family: inherit; }
input, textarea { font-family: inherit; }

/* ===== SVG Icon System ===== */
.icon {
  display: inline-block;
  vertical-align: text-bottom;
  flex-shrink: 0;
  width: 1em;
  height: 1em;
}
.icon-white   { color: #e6edf3; }
.icon-blue    { color: #58a6ff; }
.icon-green   { color: #57ab5a; }
.icon-gray    { color: #768390; }
.icon-red     { color: #e5534b; }
.icon-yellow  { color: #c69026; }
.icon-purple  { color: #986ee2; }
.icon-orange  { color: #d47c3d; }
.icon-teal    { color: #57ab5a; }
.icon-pink    { color: #cc619f; }
.icon-cyan    { color: #39c5cf; }
.icon-lime    { color: #91a835; }
.icon-indigo  { color: #768def; }
.icon-rose    { color: #e4606d; }
.icon-violet  { color: #986ee2; }
.icon-amber   { color: #d49a28; }

/* SVG use elements inherit color */
.icon use { fill: currentColor; }

/* ===== Header ===== */
.header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  justify-content: space-between;
}
.header-logo {
  font-size: 20px;
  font-weight: 700;
  color: #e6edf3;
  text-decoration: none !important;
  letter-spacing: -0.5px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-logo .logo-icon { font-size: 24px; }
.header-logo:hover { opacity: 0.85; }
.header-search {
  flex: 1;
  max-width: 360px;
  position: relative;
}
.header-search input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 6px 12px 6px 32px;
  color: #c9d1d9;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, width 0.3s;
}
.header-search input:focus { border-color: #58a6ff; width: 105%; }
.header-search .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  pointer-events: none; font-size: 16px;
}
.header-nav { display: flex; align-items: center; gap: 4px; }
.header-nav a, .header-nav button {
  color: #c9d1d9; background: none; border: none;
  padding: 6px 10px; border-radius: 6px; font-size: 14px;
  font-weight: 500; text-decoration: none; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.header-nav a:hover, .header-nav button:hover { background: #21262d; text-decoration: none; }
.header-nav .btn-new {
  background: #238636; color: #fff;
  border: 1px solid rgba(240,246,252,0.1); padding: 5px 12px; gap: 4px;
}
.header-nav .btn-new:hover { background: #2ea043; }
/* ===== User Avatar & Dropdown ===== */
.header-avatar-wrapper {
  position: relative;
}
.header-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid #30363d;
  background: #21262d;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s;
  overflow: hidden;
}
.header-avatar:hover { border-color: #58a6ff; }
.header-avatar svg { width: 18px; height: 18px; color: #8b949e; }
.avatar-dropdown {
  display: none;
  position: absolute;
  top: 40px;
  right: 0;
  min-width: 160px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 200;
  padding: 4px 0;
  overflow: hidden;
}
.avatar-dropdown.show { display: block; }
.avatar-dropdown .dd-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  font-size: 14px;
  color: #c9d1d9;
  cursor: pointer;
  transition: background 0.1s;
  border: none; background: none; width: 100%; text-align: left;
}
.avatar-dropdown .dd-item:hover { background: #1f6feb22; color: #58a6ff; }
.avatar-dropdown .dd-username {
  padding: 8px 14px 10px;
  font-size: 13px; font-weight: 600;
  color: #e6edf3;
  border-bottom: 1px solid #21262d;
  margin-bottom: 4px;
}

/* ===== Auth Modal ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  padding: 32px; width: 400px; max-width: 90vw;
}
.modal h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
.modal .form-group { margin-bottom: 16px; }
.modal .form-group label { display: block; font-size: 13px; color: #768390; margin-bottom: 4px; }
.modal .form-group input {
  width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
  padding: 8px 12px; color: #c9d1d9; font-size: 14px; outline: none;
}
.modal .form-group input:focus { border-color: #58a6ff; }
.modal .btn-primary {
  background: #238636; color: #fff; border: 1px solid rgba(240,246,252,0.1);
  padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; margin-top: 8px;
}
.modal .btn-primary:hover { background: #2ea043; }
.modal .btn-secondary {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 8px 16px; border-radius: 6px; font-size: 14px; margin-top: 8px;
}
.modal .btn-secondary:hover { background: #30363d; }
.modal .auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: #768390; }
.modal .auth-switch a { cursor: pointer; color: #58a6ff; }
.modal .error-msg { color: #e5534b; font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
.modal .close-btn {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; color: #768390; font-size: 24px; cursor: pointer;
}
.modal .close-btn:hover { color: #c9d1d9; }
.modal-wrapper { position: relative; }

/* ===== Sort Bar ===== */
.sort-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #21262d;
  position: sticky;
  top: 56px;
  z-index: 99;
  background: #0d1117;
}
.sort-bar-left {
  display: flex;
  align-items: center;
  gap: 4px;
}
.sort-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: #8b949e;
  background: none;
  border: none;
  transition: all 0.15s;
}
.sort-btn:hover { color: #c9d1d9; background: #21262d; }
.sort-btn.active { color: #c9d1d9; background: #21262d; }
.sort-bar-right {
  font-size: 13px;
  color: #8b949e;
}

/* ===== Layout ===== */
.page-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* ===== Repo Grid ===== */
.repo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
@media (max-width: 768px) {
  .repo-grid { grid-template-columns: 1fr; }
  .header { padding: 0 12px; gap: 8px; }
  .header-search { max-width: 180px; }
  .header-nav .nav-label { display: none; }
  .page-container { padding: 16px 12px; }
  .sort-bar { padding: 10px 12px; }
}

/* ===== Repo Card ===== */
.repo-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 16px;
  transition: border-color 0.2s;
  display: flex;
  flex-direction: column;
}
.repo-card:hover { border-color: #58a6ff44; }
.repo-card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}
.repo-card-name {
  font-size: 16px;
  font-weight: 600;
  color: #58a6ff;
  text-decoration: none;
  word-break: break-word;
}
.repo-card-name:hover { text-decoration: underline; }
.repo-card-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
  color: #8b949e;
  margin-top: auto;
  padding-top: 10px;
}
.repo-card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ===== Pagination ===== */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 16px 0;
}
.page-btn {
  width: 32px; height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: #c9d1d9;
  background: #21262d;
  border: 1px solid #30363d;
  transition: all 0.15s;
}
.page-btn:hover { background: #30363d; border-color: #8b949e; }
.page-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.page-btn:disabled { opacity: 0.4; cursor: default; }
.page-info {
  font-size: 13px;
  color: #8b949e;
  padding: 0 8px;
}

/* ===== Repo Detail ===== */
.repo-header {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.repo-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 8px;
}
.repo-header h1 {
  font-size: 24px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.repo-header-actions { display: flex; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 14px; border-radius: 6px; font-size: 13px;
  font-weight: 500; border: 1px solid #30363d;
  background: #21262d; color: #c9d1d9;
  transition: background 0.15s; text-decoration: none;
}
.btn:hover { background: #30363d; text-decoration: none; }
.btn-primary { background: #238636; color: #fff; border-color: rgba(240,246,252,0.1); }
.btn-primary:hover { background: #2ea043; }
.btn-danger { color: #f85149; }
.btn-danger:hover { background: #da363322; }

/* ===== README Block ===== */
.repo-readme {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 16px;
}
.repo-readme-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: #0d1117;
  border-bottom: 1px solid #30363d;
  font-size: 14px;
  font-weight: 600;
  color: #c9d1d9;
}
.repo-readme-body {
  padding: 24px;
  font-size: 14px;
  line-height: 1.7;
  color: #c9d1d9;
}
.repo-readme-body h1 { font-size: 24px; font-weight: 600; margin: 24px 0 12px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
.repo-readme-body h2 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
.repo-readme-body h3 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
.repo-readme-body p { margin: 0 0 12px; }
.repo-readme-body code {
  background: #0d1117;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Consolas', 'SF Mono', monospace;
  font-size: 13px;
}
.repo-readme-body pre {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  margin: 0 0 12px;
}
.repo-readme-body pre code {
  background: none;
  padding: 0;
}
.repo-readme-body ul, .repo-readme-body ol { margin: 0 0 12px; padding-left: 24px; }
.repo-readme-body li { margin-bottom: 4px; }
.repo-readme-body blockquote {
  border-left: 3px solid #30363d;
  padding: 4px 12px;
  margin: 0 0 12px;
  color: #8b949e;
}
.repo-readme-body a { color: #58a6ff; }
.repo-readme-body table {
  border-collapse: collapse;
  margin: 0 0 12px;
  width: 100%;
}
.repo-readme-body th, .repo-readme-body td {
  border: 1px solid #30363d;
  padding: 8px 12px;
  text-align: left;
}
.repo-readme-body th { background: #0d1117; font-weight: 600; }

/* ===== Tabs ===== */
.tabs {
  display: flex; border-bottom: 1px solid #30363d;
  margin-bottom: 16px; gap: 0;
}
.tab {
  padding: 8px 16px; font-size: 14px; font-weight: 500;
  color: #8b949e; cursor: pointer; border: none;
  background: none; border-bottom: 2px solid transparent;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: #c9d1d9; }
.tab.active { color: #c9d1d9; border-bottom-color: #f78166; }

/* ===== File List ===== */
.file-list {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 6px; overflow: hidden;
}
.file-item {
  display: flex; align-items: center; padding: 8px 16px;
  border-bottom: 1px solid #21262d; transition: background 0.15s;
  cursor: pointer; gap: 8px;
}
.file-item:last-child { border-bottom: none; }
.file-item:hover { background: #1c2128; }
.file-item .file-name { font-size: 14px; color: #58a6ff; }
.file-item .file-name:hover { text-decoration: underline; }

/* ===== Mac-style Code Window ===== */
.mac-window {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}
.mac-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #0d1117;
  border-bottom: 1px solid #30363d;
  user-select: none;
}
.mac-dots {
  display: flex;
  gap: 8px;
  align-items: center;
}
.mac-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}
.mac-dot-red    { background: #ff5f56; }
.mac-dot-yellow { background: #ffbd2e; }
.mac-dot-green  { background: #27c93f; }
.mac-title {
  font-size: 12px;
  color: #8b949e;
  font-family: 'SF Mono', 'Consolas', monospace;
}
.copy-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 4px; font-size: 12px;
  color: #8b949e; background: #21262d; border: 1px solid #30363d;
  transition: all 0.15s;
}
.copy-btn:hover { color: #c9d1d9; border-color: #8b949e; }
.copy-btn.copied { color: #3fb950; border-color: #3fb950; }
.mac-code-body {
  overflow-x: auto;
}
.mac-code-body pre {
  margin: 0 !important;
  border-radius: 0 !important;
  background: #161b22 !important;
}
.mac-code-body code {
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'SF Mono', monospace !important;
  font-size: 13px !important;
  line-height: 1.6 !important;
  tab-size: 4;
}

/* ===== Like Button ===== */
.like-section {
  display: flex; align-items: center; gap: 12px; margin: 12px 0;
}
.like-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 6px; font-size: 13px;
  font-weight: 500; border: 1px solid #30363d;
  background: #21262d; color: #c9d1d9; transition: all 0.15s;
}
.like-btn:hover { background: #30363d; border-color: #f85149; }
.like-btn.liked { background: #da363322; border-color: #f85149; color: #f85149; }
.like-btn.liked .like-icon { color: #f85149; }
.like-count { font-size: 13px; color: #8b949e; display: flex; align-items: center; gap: 4px; }

/* ===== Comments ===== */
.comments-section { margin-top: 20px; }
.comments-section h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.comment-form { display: flex; gap: 8px; margin-bottom: 16px; }
.comment-form textarea {
  flex: 1; background: #0d1117; border: 1px solid #30363d;
  border-radius: 6px; padding: 10px 12px; color: #c9d1d9;
  font-size: 14px; resize: vertical; min-height: 40px; outline: none;
  transition: border-color 0.2s;
}
.comment-form textarea:focus { border-color: #58a6ff; }
.comment-form button { align-self: flex-end; padding: 8px 16px; }
.comment-item {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 6px; padding: 12px 16px; margin-bottom: 8px;
}
.comment-item .comment-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px; font-size: 12px; color: #8b949e;
}
.comment-item .comment-body { font-size: 14px; color: #c9d1d9; white-space: pre-wrap; }
.comment-item .comment-reply-btn {
  background: none; border: none; color: #8b949e;
  font-size: 12px; cursor: pointer; padding: 2px 6px;
  border-radius: 4px; margin-top: 6px;
}
.comment-item .comment-reply-btn:hover { color: #58a6ff; background: #1f6feb22; }
.comment-replies {
  margin-left: 24px; margin-top: 8px; padding-left: 16px;
  border-left: 2px solid #30363d;
}
.comment-replies .comment-item { background: #0d1117; }
.comment-toggle {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; color: #8b949e;
  font-size: 12px; cursor: pointer; padding: 2px 6px;
  border-radius: 4px; margin-bottom: 6px;
}
.comment-toggle:hover { color: #58a6ff; background: #1f6feb22; }
.comment-replies-wrapper { overflow: hidden; transition: max-height 0.3s ease; }
.comment-replies-wrapper.collapsed { max-height: 0 !important; }

/* ===== Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 12px; padding: 24px; width: 90%;
  max-width: 500px; max-height: 85vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.modal .form-group { margin-bottom: 14px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #c9d1d9; }
.modal input, .modal textarea {
  width: 100%; background: #0d1117; border: 1px solid #30363d;
  border-radius: 6px; padding: 8px 12px; color: #c9d1d9;
  font-size: 14px; outline: none; transition: border-color 0.2s;
}
.modal input:focus, .modal textarea:focus { border-color: #58a6ff; }
.modal textarea { resize: vertical; min-height: 120px; font-family: 'Consolas', monospace; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ===== Toast ===== */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 16px; border-radius: 8px; font-size: 14px;
  color: #fff; animation: slideIn 0.3s ease; min-width: 200px;
}
.toast.success { background: #238636; }
.toast.error { background: #da3633; }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 60px 20px; color: #8b949e;
}
.empty-state h3 { font-size: 18px; color: #c9d1d9; margin-bottom: 8px; }
.empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }

/* ===== Back Button ===== */
.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 13px; color: #8b949e; margin-bottom: 12px;
  background: none; border: none; cursor: pointer; padding: 4px 0;
}
.back-link:hover { color: #58a6ff; }

/* ===== Upload Area ===== */
.upload-tab {
  flex:1; padding:6px; font-size:12px; font-weight:500;
  border:1px solid #30363d; border-radius:6px 6px 0 0;
  cursor:pointer;
}

</style>

        <rect x="35" y="116" width="110" height="32" rx="16" fill="#24292f"/>

  <div class="header-search">

  </div>
  <nav class="header-nav" id="headerNav">
    <a href="#" onclick="navigateHome(); return false;" style="display:flex;align-items:center;gap:6px;">

    <a href="#" onclick="navigateMyRepos(); return false;" id="myReposLink" style="display:none;align-items:center;gap:6px;">

      <span class="nav-label">我的仓库</span>

    <button class="btn-new" onclick="openNewRepoModal()">
      <svg class="icon icon-gray" style="font-size:14px;"><use href="#icon-plus"/></svg>
      <span class="nav-label">新建</span>

          登录
        </div>
      </div>

<!-- ===== Sort Bar ===== -->
<div class="sort-bar" id="sortBar">
  <div class="sort-bar-left">
    <span style="font-size:13px;color:#8b949e;margin-right:8px;">排序方式:</span>
    <button class="sort-btn active" data-sort="time" onclick="setSort('time')">
      <svg class="icon icon-gray" style="font-size:14px;"><use href="#icon-clock"/></svg>
      时间
    </button>
    <button class="sort-btn" data-sort="likes" onclick="setSort('likes')">
      <svg class="icon icon-gray" style="font-size:14px;"><use href="#icon-star"/></svg>
      点赞数
    </button>
  </div>
  <div class="sort-bar-right" id="repoCount">0 个仓库</div>
</div>

<!-- ===== Main Content ===== -->
<div class="page-container" id="mainContent">
</div>

<!-- ===== New Repo Modal ===== -->
<div class="modal-overlay" id="newRepoModal">
  <div class="modal">
    <h2>
      <svg class="icon icon-gray" style="font-size:20px;"><use href="#icon-repo"/></svg>
      创建新仓库
    </h2>
    <div class="form-group">
      <label>仓库名称</label>
      <input type="text" id="newRepoName" placeholder="输入仓库名称..." maxlength="100">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeNewRepoModal()">取消</button>
      <button class="btn btn-primary" onclick="createRepo()">
        <svg class="icon icon-green" style="font-size:14px;"><use href="#icon-check"/></svg>
        创建仓库
      </button>
    </div>
  </div>
</div>

<!-- ===== New Folder Modal ===== -->
<div class="modal-overlay" id="newFolderModal">
  <div class="modal" style="max-width:480px;">
    <h2>
      <svg class="icon icon-yellow" style="font-size:20px;"><use href="#icon-folder"/></svg>
      新建文件夹
    </h2>
    <div class="form-group">
      <label>文件夹名（支持嵌套路径，最多3层：如 <code style="background:#21262d;padding:1px 5px;border-radius:3px;">src/lib/utils</code>）</label>
      <input type="text" id="newFolderName" placeholder="例如: src" maxlength="255">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeNewFolderModal()">取消</button>
      <button class="btn btn-primary" onclick="createFolder()">
        <svg class="icon icon-green" style="font-size:14px;"><use href="#icon-check"/></svg>
        创建文件夹
      </button>
    </div>
  </div>
</div>

<!-- ===== New File Modal ===== -->
<div class="modal-overlay" id="newFileModal">
  <div class="modal" style="max-width:620px;">
    <h2>
      <svg class="icon icon-gray" style="font-size:20px;"><use href="#icon-file"/></svg>
      添加文件
    </h2>
    <div class="form-group">
      <label>文件名（支持嵌套路径，最多3层：如 <code style="background:#21262d;padding:1px 5px;border-radius:3px;">folder/sub/file.py</code>）</label>
      <input type="text" id="newFileName" placeholder="例如: main.py 或 src/lib/utils.py" maxlength="255">
    </div>
    <div class="form-group">
      <label>上传方式</label>
      <div class="upload-tabs" style="display:flex;gap:2px;margin-bottom:8px;">
        <button class="upload-tab active" onclick="switchUploadTab('text', this)" style="background:#21262d;color:#c9d1d9;">直接输入</button>
        <button class="upload-tab" onclick="switchUploadTab('drop', this)" style="background:#0d1117;color:#8b949e;">拖拽/选择文件</button>
      </div>
      <div id="uploadTextArea">
        <textarea id="newFileContent" placeholder="输入文件内容..." style="min-height:180px;"></textarea>
      </div>
      <div id="uploadDropZone" style="display:none;">
        <div id="dropZone" style="border:2px dashed #30363d;border-radius:6px;padding:32px;text-align:center;color:#8b949e;transition:all 0.2s;cursor:pointer;">
          <svg class="icon icon-gray empty-icon" style="font-size:32px;display:block;margin:0 auto 8px;"><use href="#icon-upload"/></svg>
          <p style="font-size:14px;margin:0;">拖拽文件到此处，或<span style="color:#58a6ff;">点击选择文件</span></p>
          <input type="file" id="filePicker" style="display:none;" onchange="handleFilePick(this)">
        </div>

          <span id="fileInfoName"></span>
          <button onclick="clearFile()" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;">
            <svg class="icon icon-rose" style="font-size:14px;"><use href="#icon-x"/></svg>

        <svg class="icon icon-gray" style="font-size:14px;"><use href="#icon-upload"/></svg>
        提交文件
      </button>
    </div>
  </div>
</div>

      <div class="auth-switch" id="authSwitch" style="text-align:center;margin-top:16px;font-size:13px;color:#768390;">没有账号？<a onclick="switchAuthMode('register')" style="cursor:pointer;color:#58a6ff;">立即注册</a></div>

  <div class="modal" style="max-width:420px;">

      <svg class="icon icon-gray" style="font-size:20px;"><use href="#icon-globe"/></svg>

      移除头像（恢复默认）

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
// ===== State =====
let currentView = 'home';
let currentRepoId = null;
let currentFileName = null;
let allRepos = [];
let currentRepo = null;
let likedRepos = JSON.parse(localStorage.getItem('shithub_likes') || '{}');
let currentSort = 'time';
let currentPage = 1;
let filteredRepos = [];
const PAGE_SIZE = 20;

// ===== SVG Icon helper =====
function icon(name, color, size) {
  size = size || 14;
  return '<svg class="icon icon-' + color + '" style="font-size:' + size + 'px;"><use href="#icon-' + name + '"/></svg>';
}

// ===== API Helpers =====
const API = {
  async getRepoList() {
    const res = await fetch('/api/repo/-1');
    if (!res.ok) throw new Error('获取仓库列表失败');
    const data = await res.json();
    return data.repos || [];
  },
  async getRepo(id) {
    const res = await fetch('/api/repo/' + id);
    if (!res.ok) throw new Error('获取仓库信息失败');
    return res.json();
  },
  async getFile(id, file) {
    const res = await fetch('/api/file/' + id + '/' + file);
    if (!res.ok) throw new Error('获取文件失败');
    return res.json();
  },
  async getRepoByUserAndName(username, reponame) {
    const res = await fetch('/api/repo/by-name/' + encodeURIComponent(username) + '/' + encodeURIComponent(reponame));
    if (!res.ok) throw new Error('仓库不存在');
    return await res.json();
  },
  async createRepo(name) {
    const res = await fetch('/api/post/repo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (!res.ok) throw new Error('创建仓库失败');
    return res.json();
  },
  async createFile(id, name, data) {
    const res = await fetch('/api/post/file', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name, data })
    });
    if (!res.ok) throw new Error('添加文件失败');
  },
  async isOwn(id) {
    try {
      const res = await fetch('/api/repo/' + id + '/isown');
      if (!res.ok) return false;
      const data = await res.json();
      return data.is === true;
    } catch (e) { return false; }
  },
  async likeRepo(id) {
    const res = await fetch('/api/post/like/' + id, { method: 'POST' });
    if (!res.ok) throw new Error('点赞失败');
  },
  async postComment(id, content, reply) {
    const body = { id, content };
    if (reply) body.reply = reply;
    const res = await fetch('/api/post/comment', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('评论失败');
  },
  async deleteFile(id, name) {
    const res = await fetch('/api/file/' + id, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.detail || '删除失败');
    }
  },
  async createFolder(id, name) {
    const res = await fetch('/api/post/folder', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name })
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.detail || '创建文件夹失败');
    }
  },
  async deleteFolder(id, name) {
    const res = await fetch('/api/folder/' + id, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.detail || '删除文件夹失败');
    }
  }
};

// ===== Toast =====
function showToast(message, type) {
  type = type || 'success';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function () { toast.remove(); }, 3000);
}

// ===== Navigation =====
async function navigateHome() {
  currentView = 'home'; currentRepoId = null; currentFileName = null;
  window.location.hash = '';
  document.getElementById('sortBar').style.display = '';
  await loadHomePage();
}

async function navigateRepo(id) {
  currentView = 'repo'; currentRepoId = id; currentFileName = null;
  window.location.hash = 'repo/' + id;
  document.getElementById('sortBar').style.display = 'none';
  await loadRepoPage(id);
}

async function navigateFile(id, file) {
  currentView = 'file'; currentRepoId = id; currentFileName = file;
  window.location.hash = 'repo/' + id + '/file/' + encodeURIComponent(file);
  await loadFilePage(id, file);
}

async function navigateMyRepos() {
  currentView = 'myRepos'; currentRepoId = null; currentFileName = null;
  window.location.hash = 'my-repos';
  document.getElementById('sortBar').style.display = 'none';
  await loadMyRepos();
}

async function loadMyRepos() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div style="text-align:center;padding:60px;"><p style="color:#8b949e;">加载中...</p></div>';
  try {
    var res = await fetch('/api/repo/mine');
    if (!res.ok) {
      var err = await res.json();
      main.innerHTML = '<div class="empty-state"><h3>需要登录</h3><p>' + escapeHtml(err.detail || '请先登录') + '</p></div>';
      return;
    }
    var data = await res.json();
    var repos = data.repos || [];
    if (repos.length === 0) {
      main.innerHTML =
        '<button class="back-link" onclick="navigateHome()">' +
          icon('arrow-left', 'gray', 14) +
          '返回首页' +
        '</button>' +
        '<div class="empty-state">' +
          '<svg class="icon icon-gray empty-icon"><use href="#icon-folder"/></svg>' +
          '<h3>你还没有仓库</h3>' +
          '<p>点击右上角"新建"按钮创建第一个仓库吧！</p>' +
          '<button class="btn btn-primary" style="margin-top:16px;" onclick="openNewRepoModal()">' +
            icon('plus', 'gray', 14) +
            '创建新仓库' +
          '</button>' +
        '</div>';
      return;
    }
    var gridHtml = '';
    for (var i = 0; i < repos.length; i++) {
      var r = repos[i];
      gridHtml +=
        '<div class="repo-card">' +
          '<div class="repo-card-top">' +
            icon('repo', 'gray', 18) +
            '<div style="width:100%;">' +
              '<a class="repo-card-name" href="#repo/' + r.id + '" onclick="navigateRepo(' + r.id + ');return false;">' + escapeHtml(r.name) + '</a>' +
              '<div style="font-size:12px;color:#8b949e;margin-top:4px;">' + r.files + ' 个文件</div>' +
            '</div>' +
          '</div>' +
          '<div class="repo-card-meta">' +
            '<span>' + icon('star', 'gray', 13) + ' ' + (r.likes || 0) + '</span>' +
            '<span>' + icon('git-branch', 'gray', 13) + 'ID: ' + r.id + '</span>' +
          '</div>' +
        '</div>';
    }
    main.innerHTML =
      '<button class="back-link" onclick="navigateHome()">' +
        icon('arrow-left', 'gray', 14) +
        '返回首页' +
      '</button>' +
      '<h2 style="font-size:20px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;">' +
        icon('folder', 'gray', 20) +
        '我的仓库 (' + repos.length + ')' +
      '</h2>' +
      '<div class="repo-grid">' + gridHtml + '</div>';
  } catch (e) {
    main.innerHTML = '<div class="empty-state"><h3>加载失败</h3><p>' + escapeHtml(e.message) + '</p></div>';
  }
}

// ===== Sorting =====
function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(function (b) {
    b.classList.toggle('active', b.dataset.sort === sort);
  });
  currentPage = 1;
  applyFilters();
}

function getSortedRepos(list) {
  var arr = list.slice();
  if (currentSort === 'time') {
    return arr.sort(function (a, b) { return b.id - a.id; });
  } else if (currentSort === 'likes') {
    return arr.sort(function (a, b) { return (b.likes || 0) - (a.likes || 0); });
  }
  return arr;
}

// ===== Filter & Paginate =====
function filterRepos() {
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  var query = document.getElementById('searchInput').value.toLowerCase();
  var matched = allRepos.filter(function (r) {
    return r.name.toLowerCase().indexOf(query) !== -1;
  });
  filteredRepos = getSortedRepos(matched);
  document.getElementById('repoCount').textContent = filteredRepos.length + ' 个仓库';
  if (currentView === 'home') renderRepoList();
}

// ===== Load Pages =====
async function loadHomePage() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div style="text-align:center;padding:60px;"><p style="color:#8b949e;">加载中...</p></div>';
  try {
    allRepos = await API.getRepoList();
    applyFilters();
  } catch (e) {
    main.innerHTML = '<div class="empty-state"><h3>加载失败</h3><p>' + escapeHtml(e.message) + '</p></div>';
  }
}

function renderRepoList() {
  var main = document.getElementById('mainContent');
  var repos = filteredRepos;
  var totalPages = Math.max(1, Math.ceil(repos.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageRepos = repos.slice(start, start + PAGE_SIZE);

  if (!repos || repos.length === 0) {
    main.innerHTML = '<div class="empty-state">' +
      '<svg class="icon icon-gray empty-icon"><use href="#icon-folder"/></svg>' +
      '<h3>暂无仓库</h3>' +
      '<p>还没有创建任何仓库，点击右上角"新建"按钮创建第一个仓库吧！</p>' +
      '<button class="btn btn-primary" style="margin-top:16px;" onclick="openNewRepoModal()">' +
        icon('plus', 'gray', 14) +
        '创建新仓库' +
      '</button>' +
    '</div>';
    return;
  }

  var gridHtml = '';
  for (var i = 0; i < pageRepos.length; i++) {
    var r = pageRepos[i];
    gridHtml +=
      '<div class="repo-card">' +
        '<div class="repo-card-top">' +
          icon('repo', 'gray', 18) +
          '<div>' +
            '<a class="repo-card-name" href="#repo/' + r.id + '" onclick="navigateRepo(' + r.id + ');return false;">' + escapeHtml(r.name) + '</a>' +
          '</div>' +
        '</div>' +
        '<div class="repo-card-meta">' +
          '<span>' +
            icon('git-branch', 'gray', 13) +
            'ID: ' + r.id +
          '</span>' +
          '<span>' +
            icon('star', 'gray', 13) +
            ' ' + (r.likes || 0) +
          '</span>' +
          '<span>' +
            icon('globe', 'gray', 13) +
            '公开' +
          '</span>' +
        '</div>' +
      '</div>';
  }

  main.innerHTML =
    '<div class="repo-grid">' + gridHtml + '</div>' +
    (totalPages > 1 ? renderPagination(totalPages) : '');
}

function renderPagination(totalPages) {
  var html = '<div class="pagination">';
  html += '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')"' + (currentPage <= 1 ? ' disabled' : '') + '>◀</button>';

  var maxVisible = 5;
  var startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
  var endPage = Math.min(totalPages, startPage + maxVisible - 1);
  if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

  if (startPage > 1) {
    html += '<button class="page-btn" onclick="goPage(1)">1</button>';
    if (startPage > 2) html += '<span class="page-info">...</span>';
  }

  for (var i2 = startPage; i2 <= endPage; i2++) {
    html += '<button class="page-btn' + (i2 === currentPage ? ' active' : '') + '" onclick="goPage(' + i2 + ')">' + i2 + '</button>';
  }

  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += '<span class="page-info">...</span>';
    html += '<button class="page-btn" onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
  }

  html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')"' + (currentPage >= totalPages ? ' disabled' : '') + '>▶</button>';
  html += '</div>';
  return html;
}

function goPage(page) {
  var totalPages = Math.max(1, Math.ceil(filteredRepos.length / PAGE_SIZE));
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderRepoList();
  document.getElementById('mainContent').scrollIntoView({ behavior: 'smooth' });
}

// ===== Repo Page =====
async function loadRepoPage(id) {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div style="text-align:center;padding:60px;"><p style="color:#8b949e;">加载仓库...</p></div>';
  try {
    currentRepo = await API.getRepo(id);
    if (currentRepo.has_liked) {
      likedRepos[id] = true;
      localStorage.setItem('shithub_likes', JSON.stringify(likedRepos));
    }
    var own = await API.isOwn(id);
    var readmeContent = null;
    var files = currentRepo.files || [];
    var readmeFile = null;
    for (var i3 = 0; i3 < files.length; i3++) {
      if (files[i3].toLowerCase() === 'readme.md') {
        readmeFile = files[i3];
        break;
      }
    }
    if (readmeFile) {
      try {
        var data = await API.getFile(id, readmeFile);
        readmeContent = data.code || '';
      } catch (e) { }
    }
    // collect all usernames for avatar batch load
    var usernames = [];
    if (currentRepo.user) usernames.push(currentRepo.user);
    var cs = currentRepo.comments || [];
    function collectUsernames(arr) {
      for (var ci = 0; ci < arr.length; ci++) {
        if (arr[ci].username) usernames.push(arr[ci].username);
        if (arr[ci].replies) collectUsernames(arr[ci].replies);
      }
    }
    collectUsernames(cs);
    await batchLoadAvatars(usernames);
    renderRepoPage(currentRepo, own, readmeContent);
  } catch (e) {
    main.innerHTML = '<div class="empty-state"><h3>加载失败</h3><p>' + escapeHtml(e.message) + '</p><button class="btn" style="margin-top:16px;" onclick="navigateHome()">返回首页</button></div>';
  }
}

function renderRepoPage(repo, isOwner, readmeContent) {
  var main = document.getElementById('mainContent');
  var files = repo.files || [];
  var likes = repo.likes || 0;
  var comments = repo.comments || [];
  var isLiked = likedRepos[currentRepoId] || false;

  var readmeHtml = '';
  if (readmeContent) {
    try {
      var rendered = marked.parse(readmeContent);
      readmeHtml =
        '<div class="repo-readme">' +
          '<div class="repo-readme-header">' +
            icon('book', 'gray', 16) +
            'README.md' +
          '</div>' +
          '<div class="repo-readme-body">' + rendered + '</div>' +
        '</div>';
    } catch (e) { }
  }

  var treeHtml = '';
  if (files.length === 0) {
    treeHtml =
      '<div class="empty-state">' +
        '<svg class="icon icon-gray empty-icon"><use href="#icon-folder"/></svg>' +
        '<h3>暂无文件</h3>' +
        '<p>这个仓库还是空的，添加第一个文件吧！</p>' +
      '</div>';
  } else {
    var tree = currentRepo.tree || {};
    treeHtml = '<div class="file-list">';
    treeHtml += renderTree(tree, '', isOwner);
    treeHtml += '</div>';
  }

  var likeIconColor = isLiked ? 'red' : 'gray';
  var likeBtnClass = isLiked ? ' liked' : '';
  var likeText = isLiked ? '已点赞' : '点赞';

  main.innerHTML =
    '<button class="back-link" onclick="navigateHome()">' +
      icon('arrow-left', 'gray', 14) +
      '返回仓库列表' +
    '</button>' +
    '<div class="repo-header">' +
      '<div class="repo-header-top">' +
        '<h1>' +
          icon('repo', 'gray', 24) +
          escapeHtml(repo.name) +
          (repo.user ? '<span style="display:inline-flex;align-items:center;gap:6px;margin-left:12px;font-size:13px;font-weight:400;color:#8b949e;">' +
            renderUserAvatar(repo.user, avatarCache[repo.user] || '', 16) +
            escapeHtml(repo.user) +
          '</span>' : '') +
        '</h1>' +
        '<div class="repo-header-actions">' +
          (isOwner ?
          '<button class="btn btn-primary" onclick="openNewFolderModal()">' +
            icon('folder', 'gray', 13) +
            '新建文件夹' +
          '</button>' +
          '<button class="btn btn-primary" onclick="openNewFileModal()">' +
            icon('plus', 'gray', 13) +
            '添加文件' +
          '</button>' : '') +
        '</div>' +
      '</div>' +
      '<div class="like-section">' +

function switchTab(tabName, btn) {
  document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });

  document.getElementById('commentsTab').style.display = tabName === 'comments' ? 'block' : 'none';

function countAllComments(comments) {
  var count = 0;
  function countRec(arr) {
    if (!arr) return;
    for (var k = 0; k < arr.length; k++) {
      count++;
      if (arr[k].replies) countRec(arr[k].replies);
    }
  }
  countRec(comments || []);
  return count;
}

function renderComments(comments) {
  var currentComments = comments || [];
  return '<div class="comments-section">' +
    '<h3>' +
      icon('comment', 'gray', 18) +
      '评论' +
    '</h3>' +
    '<div class="comment-form">' +
      '<textarea id="commentInput" placeholder="写下你的评论..." rows="2"></textarea>' +
      '<button class="btn btn-primary" onclick="submitComment(' + currentRepoId + ')">评论</button>' +
    '</div>' +
    '<div id="commentList">' +
      (currentComments.length === 0 ?
        '<div class="empty-state" style="padding:30px;"><p>还没有评论，来发表第一条评论吧！</p></div>' :
        renderCommentTree(currentComments)) +
    '</div>' +
  '</div>';
}

function renderCommentTree(comments, depth) {
  depth = depth || 0;
  var result = '';
  for (var m = 0; m < comments.length; m++) {
    var c = comments[m];
    var commentId = c.id;
    var uniqueFormId = 'reply-form-d' + depth + '-' + m + '-' + commentId;
    var username = c.username || '匿名';
    var av = avatarCache[username] || '';
    var mentionHtml = '';
    if (c.mention) {
      mentionHtml = '<span style="color:#8b949e;font-size:12px;margin-bottom:4px;display:block;">↳ ' + escapeHtml(c.mention) + '</span>';
    }
    result +=
      '<div class="comment-item' + (depth > 0 ? ' is-reply' : '') + '">' +
        '<div class="comment-header" style="display:flex;align-items:center;gap:6px;">' +
          renderUserAvatar(username, av, 16) +
          '<strong>' + escapeHtml(username) + '</strong>' +
        '</div>' +
        mentionHtml +
        '<div class="comment-body">' + escapeHtml(c.content) + '</div>' +
        '<button class="comment-reply-btn" onclick="replyToComment(' + currentRepoId + ',' + commentId + ',\'' + uniqueFormId + '\')">' +
          icon('reply', 'gray', 12) +
          '回复' +
        '</button>' +
        '<div id="' + uniqueFormId + '" style="margin-top:6px;"></div>';
    // 只有顶层评论(depth===0)才展开子回复，且所有子回复扁平展示（含mention）
    if (depth === 0 && c.replies && c.replies.length > 0) {
      result +=
        '<div class="comment-replies" style="margin-left:24px;margin-top:8px;padding-left:16px;border-left:2px solid #30363d;">' +
          renderCommentTree(c.replies, depth + 100) +
        '</div>';
    }
    result += '</div>';
  }
  return result;
}

function getPrismLanguage(filename) {
  var ext = filename.split('.').pop().toLowerCase();
  var map = {
    js: 'javascript', jsx: 'jsx', ts: 'typescript', tsx: 'tsx',
    py: 'python', rb: 'ruby', rs: 'rust', go: 'go',
    java: 'java', c: 'c', cpp: 'cpp', cs: 'csharp',
    html: 'html', css: 'css', scss: 'scss', json: 'json',
    xml: 'xml', yaml: 'yaml', yml: 'yaml', md: 'markdown',
    sql: 'sql', sh: 'bash', bash: 'bash', bat: 'batch',
    ps1: 'powershell', php: 'php', swift: 'swift', kt: 'kotlin'
  };
  return map[ext] || 'plaintext';
}

function copyCode(btn) {
  var code = btn.dataset.code;
  navigator.clipboard.writeText(code).then(function () {
    btn.classList.add('copied');

    setTimeout(function () {
      btn.classList.remove('copied');

  }).catch(function () { showToast('复制失败', 'error'); });
}

// ===== Tree Rendering =====
function renderTree(tree, prefix, isOwner) {
  prefix = prefix || '';
  var html = '';
  var entries = [];
  for (var key in tree) {
    if (tree.hasOwnProperty(key)) {
      entries.push({ name: key, value: tree[key] });
    }
  }
  // Sort: folders first, then files
  entries.sort(function (a, b) {
    var aIsFolder = a.value !== null;
    var bIsFolder = b.value !== null;
    if (aIsFolder && !bIsFolder) return -1;
    if (!aIsFolder && bIsFolder) return 1;
    return a.name.localeCompare(b.name);
  });
  for (var i = 0; i < entries.length; i++) {
    var entry = entries[i];
    var fullPath = prefix ? prefix + '/' + entry.name : entry.name;
    if (entry.value !== null) {
      // It's a folder
      html +=
        '<div class="file-item" style="display:flex;align-items:center;padding-left:' + ((fullPath.split('/').length) * 24) + 'px;gap:8px;">' +
          '<span style="flex:1;display:flex;align-items:center;gap:8px;cursor:default;">' +
            icon('folder', 'blue', 16) +
            '<span class="file-name" style="color:#c69026;font-weight:600;">' + escapeHtml(entry.name) + '/</span>' +
          '</span>' +
          (isOwner ? '<button onclick="event.stopPropagation();deleteFolder(\'' + escapeAttr(fullPath) + '\')" title="删除文件夹" style="background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#8b949e;"><svg class="icon icon-red" style="font-size:13px;"><use href="#icon-trash"/></svg></button>' : '') +
        '</div>';
      html += renderTree(entry.value, fullPath, isOwner);
    } else {
      // It's a file
      html +=
        '<div class="file-item" style="display:flex;align-items:center;padding-left:' + ((fullPath.split('/').length) * 24) + 'px;gap:8px;">' +
          '<span style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="navigateFile(' + currentRepoId + ',\'' + escapeAttr(fullPath) + '\')">' +
            icon('file', 'gray', 16) +
            '<span class="file-name">' + escapeHtml(entry.name) + '</span>' +
          '</span>' +
          (isOwner ? '<button onclick="event.stopPropagation();deleteFile(\'' + escapeAttr(fullPath) + '\')" title="删除文件" style="background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#8b949e;"><svg class="icon icon-red" style="font-size:13px;"><use href="#icon-trash"/></svg></button>' : '') +
        '</div>';
    }
  }
  return html;
}

function handleFilePick(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 102400) {
    showToast('文件大小超过 100KB 限制，当前大小: ' + formatFileSize(file.size), 'error');
    input.value = '';
    return;
  }
  if (file.size === 0) {
    showToast('文件内容为空，请选择有效文件', 'error');
    return;
  }
  var reader = new FileReader();
  reader.onload = function (e) {
    pendingFileData = e.target.result;
    pendingFileDataName = file.name;
    document.getElementById('fileInfo').style.display = 'flex';
    document.getElementById('fileInfoName').textContent = file.name + ' (' + formatFileSize(file.size) + ')';
    document.getElementById('dropZone').style.borderColor = '#3fb950';
    document.getElementById('dropZone').querySelector('p').innerHTML = '<span style="color:#3fb950;">' + icon('check', 'green', 14) + ' 文件已加载</span>';
    if (!document.getElementById('newFileName').value) {
      document.getElementById('newFileName').value = file.name;
    }
  };
  reader.readAsText(file);
}

function clearFile() {
  pendingFileData = null;
  pendingFileDataName = null;
  document.getElementById('fileInfo').style.display = 'none';
  document.getElementById('filePicker').value = '';
  document.getElementById('dropZone').style.borderColor = '#30363d';
  document.getElementById('dropZone').querySelector('p').innerHTML = '拖拽文件到此处，或<span style="color:#58a6ff;">点击选择文件</span>';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

async function addFile() {
  var name = document.getElementById('newFileName').value.trim();
  var textData = document.getElementById('newFileContent').value;

  if (!name) { showToast('请输入文件名', 'error'); return; }
  if (name.length > 255) { showToast('文件名不能超过 255 个字符', 'error'); return; }
  // Validate max 3 levels
  var depth = name.split('/').length;
  if (depth > 3) { showToast('文件路径嵌套最多3层！例如: src/lib/utils.py', 'error'); return; }
  if (!data && !textData && !pendingFileData) { showToast('请输入文件内容或上传文件', 'error'); return; }
  // Check 100KB limit
  var byteSize = new Blob([data || textData]).size;
  if (byteSize > 102400) {
    showToast('文件大小超过 100KB 限制，当前大小: ' + formatFileSize(byteSize), 'error');
    return;
  }
  try {
    await API.createFile(currentRepoId, name, data || textData);

function initDropZoneOnce() {

  if (!dz || dz.dataset.inited) return;
  dz.dataset.inited = '1';
  dz.addEventListener('click', function () { document.getElementById('filePicker').click(); });

  dz.addEventListener('dragleave', function () { dz.style.borderColor = pendingFileData ? '#3fb950' : '#30363d'; dz.style.background = ''; });
  dz.addEventListener('drop', function (e) {

    if (!file) return;
    document.getElementById('filePicker').files = e.dataTransfer.files;

    var res = await _origFetch('/api/auth/avatar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ avatar: url })
    });
    var data = await res.json();
    if (!res.ok) { showToast(data.detail || '设置失败', 'error'); return; }
    avatarCache[currentUser] = url;
    updateHeaderAvatar(url);
    closeAvatarModal();
    showToast('头像设置成功！', 'success');
    // refresh current view to show new avatar
    if (currentView === 'repo' && currentRepoId) { await loadRepoPage(currentRepoId); }
    else if (currentView === 'file' && currentRepoId && currentFileName) { await loadFilePage(currentRepoId, currentFileName); }
  } catch (e) { showToast('网络错误: ' + e.message, 'error'); }
}

async function removeAvatar() {
  try {
    var res = await _origFetch('/api/auth/avatar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ avatar: '' })
    });
    var data = await res.json();
    // allow setting empty avatar
    if (!res.ok && res.status !== 200) { showToast(data.detail || '移除失败', 'error'); return; }
    avatarCache[currentUser] = '';
    updateHeaderAvatar('');
    document.getElementById('avatarUrl').value = '';
    document.getElementById('avatarPreview').style.display = 'none';
    showToast('头像已移除', 'success');
    if (currentView === 'repo' && currentRepoId) { await loadRepoPage(currentRepoId); }
    else if (currentView === 'file' && currentRepoId && currentFileName) { await loadFilePage(currentRepoId, currentFileName); }
  } catch (e) { showToast('网络错误: ' + e.message, 'error'); }
}

// batch load avatars for a list of usernames
async function batchLoadAvatars(usernames) {
  var toLoad = [];
  for (var u = 0; u < usernames.length; u++) {
    if (!(usernames[u] in avatarCache)) {
      toLoad.push(usernames[u]);
    }
  }
  if (toLoad.length === 0) return;
  try {
    var res = await _origFetch('/api/avatars?usernames=' + encodeURIComponent(toLoad.join(',')));
    var data = await res.json();
    for (var key in data) {
      if (data.hasOwnProperty(key)) {
        avatarCache[key] = data[key];
      }
    }
    // fill blanks
    for (var t = 0; t < toLoad.length; t++) {
      if (!(toLoad[t] in avatarCache)) {
        avatarCache[toLoad[t]] = '';
      }
    }
  } catch (e) {
    // offline: use empty
    for (var t = 0; t < toLoad.length; t++) {
      if (!(toLoad[t] in avatarCache)) {
        avatarCache[toLoad[t]] = '';
      }
    }
  }
}

// ===== User color helper =====
function getUserColor(username) {
  var colors = ['blue','green','yellow','purple','orange','teal','pink','cyan','lime','indigo','rose','violet','amber'];
  var hash = 0;
  for (var i = 0; i < username.length; i++) { hash = username.charCodeAt(i) + ((hash << 5) - hash); }
  hash = Math.abs(hash);
  return colors[hash % colors.length];
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '"');
}

// ===== Hash Router =====
function handleHashChange() {
  var hash = window.location.hash.slice(1);
  if (!hash) { navigateHome(); return; }
  var parts = hash.split('/');
  if (hash === 'my-repos') {
    navigateMyRepos();
  } else if (parts[0] === 'repo' && parts[1]) {
    // Legacy format: #repo/{id} or #repo/{id}/file/{file}
    var id = parseInt(parts[1]);
    if (parts.length >= 4 && parts[2] === 'file') {
      // File path may contain slashes, rejoin remaining parts
      var filePath = parts.slice(3).join('/');
      navigateFile(id, decodeURIComponent(filePath));
    } else {
      navigateRepo(id);
    }
  } else if (hash && parts.length >= 2 && parts[0] !== 'repo' && parts[0] !== 'my-repos') {
    // New format: #username/reponame or #username/reponame/file/...
    var username = parts[0];
    if (parts.length >= 4 && parts[2] === 'file') {
      var filePath = parts.slice(3).join('/');
      navigateFileByUserAndName(username, parts[1], decodeURIComponent(filePath));
    } else {
      navigateRepoByUserAndName(username, parts[1]);
    }
  } else { navigateHome(); }
}
window.addEventListener('hashchange', handleHashChange);

async function navigateRepoByUserAndName(username, reponame) {
  currentView = 'repo'; currentRepoId = null; currentFileName = null;
  window.location.hash = username + '/' + reponame;
  document.getElementById('sortBar').style.display = 'none';
  try {
    var repo = await API.getRepoByUserAndName(username, reponame);
    currentRepoId = repo.id;
    await loadRepoPage(repo.id);
  } catch (e) {
    var main = document.getElementById('mainContent');
    main.innerHTML = '<div class="empty-state"><h3>仓库不存在</h3><p>' + escapeHtml(e.message) + '</p><button class="btn" style="margin-top:16px;" onclick="navigateHome()">返回首页</button></div>';
  }
}

async function navigateFileByUserAndName(username, reponame, file) {
  currentView = 'file'; currentRepoId = null; currentFileName = null;
  window.location.hash = username + '/' + reponame + '/file/' + encodeURIComponent(file);
  document.getElementById('sortBar').style.display = 'none';
  try {
    var repo = await API.getRepoByUserAndName(username, reponame);
    currentRepoId = repo.id;
    currentFileName = file;
    await loadFilePage(repo.id, file);
  } catch (e) {
    var main = document.getElementById('mainContent');
    main.innerHTML = '<div class="empty-state"><h3>仓库不存在</h3><p>' + escapeHtml(e.message) + '</p><button class="btn" style="margin-top:16px;" onclick="navigateHome()">返回首页</button></div>';
  }
}

// ===== Auth State =====
let authMode = 'login';
let currentUser = null;
let authToken = null;
let captchaToken = null;

function updateUIForAuth() {
  document.getElementById('avatarGuest').style.display = currentUser ? 'none' : '';
  document.getElementById('avatarUser').style.display = currentUser ? '' : 'none';
  document.getElementById('myReposLink').style.display = currentUser ? '' : 'none';
  if (currentUser) {
    document.getElementById('displayUsername').textContent = currentUser;
  }
}

function toggleAvatarDropdown() {
  var dropdown = currentUser 
    ? document.getElementById('avatarDropdownUser')
    : document.getElementById('avatarDropdownGuest');
  dropdown.classList.toggle('show');
}

function closeAvatarDropdown() {
  document.getElementById('avatarDropdownGuest').classList.remove('show');
  document.getElementById('avatarDropdownUser').classList.remove('show');
}

// Click outside avatar dropdown to close
document.addEventListener('click', function(e) {
  if (!e.target.closest('.header-avatar-wrapper')) {
    closeAvatarDropdown();
  }
});

function showAuthModal(mode) {
  authMode = mode;
  document.getElementById('authModalTitle').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authSubmitBtn').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authSwitch').innerHTML = mode === 'login'
    ? '没有账号？<a onclick="switchAuthMode(\'register\')" style="cursor:pointer;color:#58a6ff;">立即注册</a>'
    : '已有账号？<a onclick="switchAuthMode(\'login\')" style="cursor:pointer;color:#58a6ff;">立即登录</a>';
  document.getElementById('authError').textContent = '';
  document.getElementById('authUsername').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authCaptcha').value = '';
  refreshCaptcha();
  document.getElementById('authModal').style.display = 'flex';
  document.getElementById('authUsername').focus();
}

function closeAuthModal() {
  document.getElementById('authModal').style.display = 'none';
}

function switchAuthMode(mode) {
  authMode = mode;
  showAuthModal(mode);
}

async function refreshCaptcha() {
  try {
    var res = await _origFetch('/api/auth/captcha');
    if (!res.ok) return;
    captchaToken = res.headers.get('X-Captcha-Token');
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var img = document.getElementById('captchaImg');
    if (img) img.src = url;
  } catch (e) {}
}

async function handleAuth() {
  var username = document.getElementById('authUsername').value.trim();
  var password = document.getElementById('authPassword').value;
  var captchaInput = document.getElementById('authCaptcha').value.trim();
  var errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!username) { errEl.textContent = '请输入用户名'; return; }
  if (!password) { errEl.textContent = '请输入密码'; return; }
  if (!captchaInput) { errEl.textContent = '请输入验证码'; return; }
  if (username.length > 50) { errEl.textContent = '用户名不能超过50个字符'; return; }
  try {
    var res = await _origFetch('/api/auth/' + authMode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password, captcha_token: captchaToken, captcha: captchaInput })
    });
    var data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.detail || (authMode === 'login' ? '登录失败' : '注册失败');
      refreshCaptcha();
      document.getElementById('authCaptcha').value = '';
      return;
    }
    authToken = data.token;
    currentUser = data.username;
    localStorage.setItem('shithub_token', data.token);
    localStorage.setItem('shithub_user', data.username);
    if (data.avatar) {
      avatarCache[data.username] = data.avatar;
      updateHeaderAvatar(data.avatar);
    } else {
      avatarCache[data.username] = '';
      updateHeaderAvatar('');
    }
    updateUIForAuth();
    closeAuthModal();
    showToast(authMode === 'login' ? '登录成功！欢迎 ' + username : '注册成功！欢迎 ' + username, 'success');
    if (currentView === 'home') { await loadHomePage(); }
    else if (currentView === 'repo' && currentRepoId) { await loadRepoPage(currentRepoId); }
  } catch (e) {
    errEl.textContent = '网络错误: ' + e.message;
    refreshCaptcha();
    document.getElementById('authCaptcha').value = '';
  }
}

async function logout() {
  try {
    await _origFetch('/api/auth/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
  } catch (e) { }
  authToken = null;
  currentUser = null;
  localStorage.removeItem('shithub_token');
  localStorage.removeItem('shithub_user');
  updateUIForAuth();
  showToast('已退出登录', 'success');
  if (currentView === 'home') { await loadHomePage(); }
  else if (currentView === 'repo' && currentRepoId) { await loadRepoPage(currentRepoId); }
}

// Intercept fetch to add Authorization header
var _origFetch = window.fetch;
window.fetch = function(url, options) {
  options = options || {};
  options.headers = options.headers || {};
  if (authToken) {
    if (options.headers instanceof Headers) {
      options.headers.set('Authorization', 'Bearer ' + authToken);
    } else {
      options.headers['Authorization'] = 'Bearer ' + authToken;
    }
  }
  return _origFetch(url, options);
};

// Click outside auth modal to close
document.getElementById('authModal').addEventListener('click', function(e) {
  if (e.target === this) closeAuthModal();
});

// Escape key to close auth modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeAuthModal(); closeNewRepoModal(); closeNewFileModal(); }
});

// ===== Init =====
(function init() {
  // Restore login from localStorage
  var savedToken = localStorage.getItem('shithub_token');
  var savedUser = localStorage.getItem('shithub_user');
  
  function startApp() {
    if (window.location.hash) {
      handleHashChange();
    } else {
      loadHomePage();
    }
  }
  
  if (savedToken && savedUser) {
    // Verify token is still valid with server
    _origFetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + savedToken }
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.username) {
        authToken = savedToken;
        currentUser = d.username;
        localStorage.setItem('shithub_token', savedToken);
        localStorage.setItem('shithub_user', d.username);
        avatarCache[d.username] = d.avatar || '';
        updateHeaderAvatar(d.avatar || '');
        updateUIForAuth();
      } else {
        // Token invalid, clear storage
        localStorage.removeItem('shithub_token');
        localStorage.removeItem('shithub_user');
      }
      startApp();
    }).catch(function() {
      // Server unreachable, restore from cache anyway
      authToken = savedToken;
      currentUser = savedUser;
      updateUIForAuth();
      startApp();
    });
  } else {
    startApp();
  }
})();
</script>
